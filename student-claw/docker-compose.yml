# ============================================================================
#  Student Claw — local infrastructure services
#  Brings up PostgreSQL, Qdrant, Redis, and MinIO for development.
#
#  Usage:  docker compose up -d        (start)
#          docker compose down         (stop, keep data)
#          docker compose down -v       (stop, wipe data)
# ============================================================================

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: student_claw
      POSTGRES_PASSWORD: student_claw
      POSTGRES_DB: student_claw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student_claw"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrantdata:/qdrant/storage

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console (http://localhost:9001)
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  qdrantdata:
  redisdata:
  miniodata:
